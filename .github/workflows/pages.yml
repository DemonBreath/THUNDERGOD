name: Deploy SEED to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy seed/index.html to gh-pages branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout --orphan gh-pages-tmp
          cp seed/index.html index.html
          cp seed/.nojekyll .nojekyll 2>/dev/null || touch .nojekyll
          git add index.html .nojekyll
          git commit -m "Deploy SEED $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git branch -M gh-pages
          git push -f origin gh-pages
